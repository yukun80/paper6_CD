seed: 42

runtime:
  require_cuda: true
  amp:
    enabled: true
    dtype: fp16

data:
  root: datasets/urban_sar_floods_256
  train_split: Train_dataset.txt
  val_split: Valid_dataset.txt
  # 当前数据集无独立 test split，默认复用 val。
  test_split: Valid_dataset.txt

  input_mode: 8ch
  crop_size: 252
  ignore_index: 255
  auto_label_mapping: true
  class_names: [non-flood, flood-open, flood-urban]

  # 8ch 训练集统计（实测计算，忽略 NaN）
  mean: [0.2741981147758098, 0.3617288013899532, 0.18631082975238894, 0.2530457342944884, -15.64688040577946, -9.69375420050698, -15.465436828638111, -9.58561752456417]
  std: [0.19000693670287366, 0.23789379281347253, 0.16450786913826562, 0.2128030703771797, 4.393896835034889, 4.499949171287589, 4.8541489287285104, 5.210986440116357]

model:
  checkpoint_path: panopticon/checkpoints/panopticon_vitb14_teacher.pth
  block_indices: [3, 5, 7, 11]
  fpn_dim: 256
  head_hidden: 128

  use_time_embed: true
  use_metadata_embed: true
  feature_type_num: 3
  temporal_role_num: 5
  polarization_num: 2
  source_role_num: 2
  source_role_scale: 0.1

  enable_router: true
  enable_memory: false
  enable_prompt_refiner: false

loss:
  # 分层损失权重
  w_floodness: 1.0
  w_router: 0.3
  w_open: 0.5
  w_urban: 0.8
  w_final: 1.0
  w_boundary: 0.2
  w_consistency: 0.1

  use_focal_final: true
  focal_gamma: 2.0
  focal_alpha: 0.25
  urban_class_weight: 4.0

sampler:
  enable_urban_oversample: true
  urban_weight: 4.0
  open_weight: 1.5
  hard_score_file: ""

optim:
  lr_adapter: 1.0e-4
  lr_heads: 1.0e-4
  lr_backbone: 1.0e-5
  weight_decay: 0.01

scheduler:
  name: cosine

train:
  output_dir: Region-Aware_Hierarchical_PanFlood/outputs
  run_name: stage_base

  epochs: 30
  freeze_backbone_epochs: 5
  unfreeze_last_n_blocks: 5

  batch_size: 8
  val_batch_size: 1
  num_workers: 4
  grad_clip_norm: 1.0
  log_interval: 50

  best_metric: val_mIoU
  best_mode: max
